name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false
      
      - name: Run tests
        run: go test ./...
      
      - name: Build
        run: go build -ldflags="-s -w -H windowsgui" -o zapret-core.exe .
      
      - name: Create distribution directory
        run: |
          mkdir dist
          mkdir dist\zapret-core
          copy zapret-core.exe dist\zapret-core\
          xcopy /E /I /Y assets dist\zapret-core\assets
          xcopy /E /I /Y lists dist\zapret-core\lists
          copy README.md dist\zapret-core\
          copy README.ru.md dist\zapret-core\
      
      - name: Get version
        id: get_version
        run: |
          $version = git describe --tags --abbrev=0
          Write-Output "VERSION=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh
      
      - name: Create zip
        run: powershell -Command "Compress-Archive -Path 'dist\zapret-core' -DestinationPath 'zapret-core-${{ steps.get_version.outputs.VERSION }}-windows-amd64.zip' -Force"
      
      - name: Generate Release Notes
        id: release_notes
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          $version = $env:VERSION
          Write-Host "Version: $version"
          $prevTag = & git describe --tags --abbrev=0 HEAD^ 2>&1
          if ($LASTEXITCODE -ne 0) { $prevTag = "" }
          Write-Host "Previous tag: $prevTag"
          
          if ($prevTag) {
            $commits = git log $prevTag..HEAD --pretty=format:"%s"
          } else {
            $commits = git log HEAD --pretty=format:"%s" -20
          }
          
          $feat = @()
          $fix = @()
          $docs = @()
          $refactor = @()
          $chore = @()
          $other = @()
          
          foreach ($commit in $commits) {
            if ($commit -match '^feat\((.+)\):\s+(.+)$') {
              $feat += "  - **$($matches[1])**: $($matches[2])"
            } elseif ($commit -match '^feat:\s+(.+)$') {
              $feat += "  - $($matches[1])"
            } elseif ($commit -match '^fix\((.+)\):\s+(.+)$') {
              $fix += "  - **$($matches[1])**: $($matches[2])"
            } elseif ($commit -match '^fix:\s+(.+)$') {
              $fix += "  - $($matches[1])"
            } elseif ($commit -match '^docs\((.+)\):\s+(.+)$') {
              $docs += "  - **$($matches[1])**: $($matches[2])"
            } elseif ($commit -match '^docs:\s+(.+)$') {
              $docs += "  - $($matches[1])"
            } elseif ($commit -match '^refactor\((.+)\):\s+(.+)$') {
              $refactor += "  - **$($matches[1])**: $($matches[2])"
            } elseif ($commit -match '^refactor:\s+(.+)$') {
              $refactor += "  - $($matches[1])"
            } elseif ($commit -match '^chore\((.+)\):\s+(.+)$') {
              $chore += "  - **$($matches[1])**: $($matches[2])"
            } elseif ($commit -match '^chore:\s+(.+)$') {
              $chore += "  - $($matches[1])"
            } else {
              $other += "  - $commit"
            }
          }
          
          $notes = "## What's New in $version`n`n"
          
          if ($feat.Count -gt 0) {
            $notes += "### Features`n"
            $feat | ForEach-Object { $notes += "$_`n" }
            $notes += "`n"
          }
          
          if ($fix.Count -gt 0) {
            $notes += "### Bug Fixes`n"
            $fix | ForEach-Object { $notes += "$_`n" }
            $notes += "`n"
          }
          
          if ($docs.Count -gt 0) {
            $notes += "### Documentation`n"
            $docs | ForEach-Object { $notes += "$_`n" }
            $notes += "`n"
          }
          
          if ($refactor.Count -gt 0) {
            $notes += "### Refactoring`n"
            $refactor | ForEach-Object { $notes += "$_`n" }
            $notes += "`n"
          }
          
          if ($chore.Count -gt 0) {
            $notes += "### Chores`n"
            $chore | ForEach-Object { $notes += "$_`n" }
            $notes += "`n"
          }
          
          if ($other.Count -gt 0) {
            $notes += "### Other Changes`n"
            $other | ForEach-Object { $notes += "$_`n" }
            $notes += "`n"
          }
          
          $notes += "---`n`n"
          $notes += "**Download:** [zapret-core-$version-windows-amd64.zip](https://github.com/elev1e1nSure/zapret-core/releases/download/$version/zapret-core-$version-windows-amd64.zip)`n`n"
          $notes += "**Note:** Run as administrator. WinDivert requires kernel driver access."
          
          $notes | Out-File -FilePath "release_notes.md" -Encoding UTF8
        shell: pwsh
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: zapret-core-${{ steps.get_version.outputs.VERSION }}-windows-amd64.zip
          draft: false
          prerelease: false
          body_path: release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}